# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Test by coverage and tox

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", 3.14]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        id: cache
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ env.pythonLocation }}-${{ hashFiles('**/uv.lock') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --group dev --group test -e ".[accel]"
      - name: Check
        run: make check
      - name: Test with pytest
        run: |
          pytest --cov=aiopathlib --cov-append tests
          pip uninstall orjson
          pytest --cov=aiopathlib --cov-append tests/test_async.py::test_json
          pip install orjson
      - name: Upload result to codecov
        uses: codecov/codecov-action@v2
        with:
          verbose: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", 3.11, 3.12, 3.13, 3.14]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - uses: actions/cache@v5
      id: cache
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-python-${{ env.pythonLocation }}-${{ hashFiles('**/uv.lock') }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --group dev --group test -e ".[accel]"
    - name: Install dependencies
      run: |
        pip install tox tox-gh-actions
    - name: Test with tox
      run: tox
